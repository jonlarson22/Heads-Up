<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family Heads Up</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Helper styles for Leaderboard & Landscape layout */
    .leaderboard-list { flex: 1; overflow-y: auto; width: 100%; margin: 15px 0; padding-right: 4px; }
    .score-card {
      background: white; padding: 16px 20px; border-radius: 16px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--shadow-soft); border-left: 6px solid var(--secondary);
    }
    .score-card .player-info strong { font-size: 1.2rem; color: var(--text-main); }
    .score-card .player-info small { color: var(--text-muted); font-weight: 700; }
    .score-card .points-area { text-align: right; }
    .score-card .points { font-size: 1.8rem; font-weight: 900; color: #06D6A0; line-height: 1; }
    .score-card .date-stamp { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; margin-top: 4px; display: block; }
    
    .filter-container { width: 100%; margin-bottom: 10px; }
    .guest-input { margin-top: 10px; }
  </style>
</head>
<body>

  <main class="app-container">

    <section id="view-lobby" class="view active">
      <header class="app-header">
        <h1>Heads Up!</h1>
        <p class="subtitle">Family Edition</p>
      </header>

      <div class="category-container">
        <label for="playerSelect">Who is playing?</label>
        <select id="playerSelect" class="styled-select">
          <option value="" disabled selected>Select player...</option>
          <option value="Jonathan">Jonathan</option>
          <option value="Mom">Mom</option>
          <option value="Sarah">Sarah</option>
          <option value="Dave">Dave</option>
          <option value="GUEST">➕ Guest (Type Name)...</option>
        </select>
        <input type="text" id="guestNameInput" class="styled-select guest-input hidden" placeholder="Type guest name...">

        <label for="categorySelect" style="margin-top: 24px;">Choose Category:</label>
        <select id="categorySelect" class="styled-select">
          <option value="family_jokes">👨‍👩‍👧‍👦 Inside Jokes</option>
          <option value="movies">🍿 Movie Night</option>
          <option value="animals">🦁 Silly Animals</option>
        </select>
      </div>

      <footer class="app-footer">
        <button id="startBtn" class="primary-btn">Start Game (60s)</button>
        <button id="viewLeaderboardBtn" class="action-btn" style="background: var(--text-muted); box-shadow: 0 5px 0px #6C757D;">🏆 View Leaderboard</button>
      </footer>
    </section>

    <section id="view-stage" class="view stage-landscape-view">
      
      <div class="card-stage landscape-card-stage">
        <div class="flashcard landscape-flashcard">
          <div class="card-content" id="cardContent">
            <h2 class="game-word">Place on forehead!</h2>
          </div>
        </div>
      </div>

      <div class="landscape-controls-area">
        <div id="controlsPreStart" class="control-group">
          <button id="startTimerBtn" class="secondary-btn">Tap to Begin</button>
        </div>

        <div id="controlsActive" class="control-group game-controls hidden">
          <button id="skipBtn" class="action-btn skip-btn">Pass</button>
          <button id="correctBtn" class="action-btn correct-btn">Correct!</button>
        </div>
      </div>

      <div class="progress-container bottom-edge-timer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <section id="view-recap" class="view">
      <div class="recap-stage">
        <div class="recap-box">
          <h2>⏰ Time's Up!</h2>
          <div class="recap-score">
            <p id="recapPlayerName">Player</p>
            <span id="recapScoreValue">0</span>
            <p id="recapPassStats" style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);">0 Correct • 0 Passes</p>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        <button id="playAgainBtn" class="secondary-btn">Play Again</button>
        <button id="changeModeBtn" class="action-btn skip-btn">Change Player / Category</button>
      </footer>
    </section>

    <section id="view-leaderboard" class="view">
      <header class="app-header" style="padding-bottom: 5px;">
        <h1>🏆 High Scores</h1>
      </header>

      <div class="filter-container">
        <select id="filterCategory" class="styled-select" style="padding: 12px 16px; font-size: 1rem;">
          <option value="ALL">Showing: All Categories</option>
          <option value="family_jokes">Inside Jokes</option>
          <option value="movies">Movie Night</option>
          <option value="animals">Silly Animals</option>
        </select>
      </div>

      <div id="leaderboardList" class="leaderboard-list"></div>

      <footer class="app-footer">
        <button id="backToLobbyBtn" class="primary-btn">Back to Menu</button>
      </footer>
    </section>

  </main>
  <script src="app.js"></script>
</body>
</html>
