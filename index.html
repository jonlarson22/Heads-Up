<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Larson Family Heads Up!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="./logos/logox512.png">
</head>
<body>

  <main class="app-container">

    <section id="view-lobby" class="view active">
      <header class="app-header">
        <h1>Heads Up!</h1>
        <p class="subtitle">Larson Family Edition</p>
      </header>

      <div class="category-container">
        <label for="playerSelect">Who is playing?</label>
        <select id="playerSelect" class="styled-select">
          <option value="" disabled selected>Select player...</option>
          <option value="Jonathan">Jonathan</option>
          <option value="Mom">Mom</option>
          <option value="Dad">Dad</option>
          <option value="Other">Other</option>
          <option value="GUEST">➕ Guest</option>
        </select>
        <input type="text" id="guestNameInput" class="guest-input hidden" style="width: 100%; padding: 12px 16px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box;" placeholder="Type guest name...">

        <label for="categorySelect" style="margin-top: 24px;">Categories:</label>
        <select id="categorySelect" class="styled-select">
          <option value="" disabled selected>Choose Category...</option>
          <option value="movies">🍿 Movie Night</option>
          <option value="animals">🦁 Silly Animals</option>
          <option value="sports">🏈 Sports</option>
          <option value="foods">🍔 Foods</option>
        </select>
      </div>

      <footer class="app-footer">
        <button id="startBtn" class="secondary-btn">Start Game (60s)</button>
        <button id="viewLeaderboardBtn" class="action-btn" style="background: var(--text-muted); box-shadow: 0 5px 0px #6C757D;">🏆 View High Scores</button>
      </footer>
    </section>

    <section id="view-stage" class="view stage-landscape-view">
      <span id="scoreValue" class="hidden">0</span>

      <div class="card-stage landscape-card-stage">
        <div class="flashcard landscape-flashcard">
          <div class="card-content" id="cardContent">
            <h2 class="game-word">Place on forehead!</h2>
          </div>
        </div>
      </div>

      <div class="landscape-controls-area">
        <div id="controlsPreStart" class="control-group">
          <button id="startTimerBtn" class="secondary-btn">Tap to Begin</button>
        </div>

        <div id="controlsActive" class="control-group game-controls hidden">
          <button id="skipBtn" class="action-btn skip-btn">Skip</button>
          <button id="correctBtn" class="action-btn correct-btn">Correct!</button>
        </div>
      </div>

      <div class="progress-container bottom-edge-timer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <section id="view-recap" class="view">
      <div class="recap-stage">
        <div class="recap-box">
          <h2>⏰ Time's Up!</h2>
          <div class="recap-score">
            <p id="recapPlayerName">Player</p>
            <span id="recapScoreValue">0</span>
            <p id="recapPassStats" style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);">0 Correct • 0 Skips</p>
            <button id="saveNameBtn" class="action-btn hidden" style="margin-top: 15px; font-size: 0.9rem; background: var(--secondary);">💾 Save My Name for Next Time</button>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        <button id="playAgainBtn" class="secondary-btn">Play Again</button>
        <button id="changeModeBtn" class="action-btn skip-btn">Change Player / Category</button>
      </footer>
    </section>

    <section id="view-leaderboard" class="view">
      <header class="app-header" style="padding-bottom: 5px;">
        <h1>🏆 High Scores</h1>
      </header>

      <div class="filter-container">
        <select id="filterCategory" class="styled-select" style="padding: 12px 16px; font-size: 1rem;">
          <option value="ALL">Showing: All Categories</option>
          <option value="movies">Movie Night</option>
          <option value="animals">Silly Animals</option>
          <option value="sports">Sports</option>
          <option value="foods">Foods</option>
        </select>

        <select id="filterPlayer" class="styled-select" style="margin-top: 10px; padding: 12px 16px; font-size: 1rem;">
        </select>
      </div>
      
      <div id="leaderboardList" class="leaderboard-list"></div>

      <footer class="app-footer">
        <button id="backToLobbyBtn" class="primary-btn">Back to Menu</button>
      </footer>
    </section>

  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
