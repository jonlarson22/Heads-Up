<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Database Seeder</title>
  <style>
    body { font-family: sans-serif; padding: 40px; text-align: center; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #06D6A0; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Firebase Database Seeder</h1>
  <p>Click the button below to push your initial categories to Firestore.</p>
  <button id="seedBtn">Push Data to Firebase</button>

  <script type="module">
    // 1. Import your existing database connection
    import { db } from './firebase-init.js';
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const FALLBACK_DATA = {
      family_jokes: { 
        name: "Inside Jokes", 
        words: ["Dad's Sneezing", "The Dog's Breath", "Camping 2025", "Mom's Cooking", "Burnt Toast", "Roadtrip Songs"] 
      },
      movies: { 
        name: "Movie Night", 
        words: ["Star Wars", "Frozen", "The Matrix", "Toy Story", "Jurassic Park", "Shrek", "Moana"] 
      },
      animals: { 
        name: "Silly Animals", 
        words: ["Elephant", "Giraffe", "Sloth", "T-Rex", "Penguin", "Kangaroo", "Cheetah"] 
      }
    };

    document.getElementById('seedBtn').addEventListener('click', async () => {
      const btn = document.getElementById('seedBtn');
      btn.innerText = "Uploading...";
      btn.disabled = true;

      try {
        for (const [id, data] of Object.entries(FALLBACK_DATA)) {
          await setDoc(doc(db, "categories", id), data);
          console.log(`Saved ${id}`);
        }
        alert("Success! All data pushed to Firestore. You can safely delete this file.");
        btn.innerText = "Done!";
      } catch (error) {
        console.error("Upload failed: ", error);
        btn.innerText = "Error - Check Console";
      }
    });
  </script>
</body>
</html>
